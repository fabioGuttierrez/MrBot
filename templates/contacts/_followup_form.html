<!-- partial: _followup_form.html -->
<form hx-post="{% url 'contacts:followup_create' %}"
      hx-target="#followup-modal-content"
      hx-swap="innerHTML"
      class="space-y-4">
  {% csrf_token %}
  {% if conversation_id %}
    <input type="hidden" name="conversation_id" value="{{ conversation_id }}">
  {% endif %}

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Contato <span class="text-red-400">*</span></label>
    <select name="contact_id" required
            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-wa-green">
      <option value="">Selecione um contato...</option>
      {% for c in contacts %}
        <option value="{{ c.id }}" {% if preselected_contact and preselected_contact.id == c.id %}selected{% endif %}>
          {{ c.display_name }} — {{ c.phone }}
        </option>
      {% endfor %}
    </select>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Sessão WhatsApp <span class="text-red-400">*</span></label>
    <select name="session_id" required
            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-wa-green">
      <option value="">Selecione uma sessão...</option>
      {% for session in sessions %}
        <option value="{{ session.id }}">{{ session.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Data e hora do envio <span class="text-red-400">*</span></label>
    <input type="datetime-local" name="scheduled_at" required
           class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-wa-green">
  </div>

  <div x-data="{ chars: 0 }">
    <div class="flex items-center justify-between mb-1">
      <label class="block text-sm font-medium text-gray-700">Mensagem <span class="text-red-400">*</span></label>
      <span class="text-xs text-gray-400" x-text="`${chars} caracteres`"></span>
    </div>
    <textarea name="message" rows="4" required
              @input="chars = $el.value.length"
              placeholder="Oi! Passando para ver se você teve alguma dúvida..."
              class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-wa-green resize-none"></textarea>
  </div>

  {% if not sessions %}
  <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-sm text-yellow-700">
    Nenhuma sessão WhatsApp conectada. Conecte antes de agendar follow-ups.
  </div>
  {% endif %}

  <div class="flex justify-end gap-3 pt-2 border-t border-gray-100">
    <button type="button" @click="open = false"
            class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800 transition">Cancelar</button>
    <button type="submit" {% if not sessions %}disabled{% endif %}
            class="px-5 py-2 bg-wa-green hover:bg-wa-dark disabled:opacity-50 text-white text-sm font-semibold rounded-lg transition">
      Agendar
    </button>
  </div>
</form>
