<span id="status-badge-{{ conversation.id }}"
      class="px-2 py-1 text-xs font-medium rounded-full
  {% if conversation.status == 'bot' %}bg-green-100 text-green-700
  {% elif conversation.status == 'human' %}bg-blue-100 text-blue-700
  {% elif conversation.status == 'pending' %}bg-orange-100 text-orange-700
  {% else %}bg-gray-100 text-gray-500{% endif %}">
  {% if conversation.status == 'bot' %}🤖 Bot
  {% elif conversation.status == 'human' %}👤 Humano
  {% elif conversation.status == 'pending' %}⏳ Pendente
  {% else %}✓ Encerrado{% endif %}
</span>
